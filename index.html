<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CREADOR VIC PERSI</title>
  <style>
    /* Estilos base: Fondo negro y tipografía elegante */
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      /* Usamos una fuente del sistema moderna y limpia */
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      touch-action: none; /* Desactiva gestos del navegador para el canvas */
      user-select: none; /* Evita seleccionar texto accidentalmente */
    }
    canvas {
      display: block;
    }
    /* Capa de interfaz de usuario (leyenda inferior) */
    #ui-layer {
      position: absolute;
      bottom: 25px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none; /* No interfiere con los toques en el canvas */
      text-shadow: 0 0 5px rgba(255,255,255,0.4);
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div id="ui-layer">Toca para la música y corazones • Desliza para mover</div>
  <canvas id="canvas"></canvas>

  <audio id="bg-music" loop preload="auto">
    <source src="https://github.com/codeninja543/codeninja5433/raw/refs/heads/main/Encontrarte%20%20Griss%20Romero%20ft.%20Lucah.mp3" type="audio/mpeg">
  </audio>

  <script>
    // --- CONFIGURACIÓN DEL CANVAS ---
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let w, h;
    
    // Ajustar el canvas al tamaño de la ventana
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // --- DATOS Y ARRAYS DE OBJETOS ---
    const PHRASES = [
      "VicPersi", "Programador", "Eres mi vida", "Mi cielo",
      "Diseñador", "Gráfico", "Contigo siempre",
      "Me Gustas", "Mi amor", "Eres especial",
      "Me fascinas", "Me encantas", "Te adoro ❤"
    ];

    const texts = [];      // Frases que avanzan
    const stars = [];      // Estrellas de fondo
    const hearts = [];     // Corazones voladores de fondo
    const particles = [];  // Corazones de la explosión interactiva (NUEVO)

    let phraseIndex = 0;
    let offsetX = 0, offsetY = 0, zoom = 1; // Controles de cámara
    let heartBeat = 0; // Controlador de la animación del pulso

    // --- CONSTRUCTORES DE OBJETOS (PARTÍCULAS) ---

    // 1. Estrellas de fondo (puntos de luz)
    function createStar() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 2000,
        speed: 0.5 + Math.random() * 1.5
      };
    }

    // 2. Pequeños corazones voladores de fondo
    function createHeart() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1500 + 500,
        speed: 3 + Math.random() * 2,
        // Color HSL para variaciones sutiles de rojo/rosa
        color: `hsl(${Math.random() * 15 + 345}, 100%, 70%)` 
      };
    }

    // 3. Textos principales que avanzan hacia la cámara
    function spawnTextInOrder(){
      if (texts.length >= 8) return; // Límite para no saturar
      const phrase = PHRASES[phraseIndex % PHRASES.length];
      phraseIndex++;
      texts.push({
        text: phrase,
        x: (Math.random() - 0.5) * w * 1.7, // Área de spawn amplia
        y: (Math.random() - 0.5) * h * 1.7,
        z: 2000, // Comienzan lejos
        speed: 7 + Math.random() * 4,
        baseFont: (w < 600 ? 35 : 50), // Tamaño adaptado a móvil
        hue: Math.random() * 360 // Color aleatorio para el brillo
      });
    }

    // 4. Corazones de la Explosión Interactiva (NUEVO)
    function createExplosion(x, y) {
      const count = w < 600 ? 10 : 18; // Menos partículas en móvil para rendimiento
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x,
          y: y,
          // Velocidad aleatoria en todas direcciones
          vx: (Math.random() - 0.5) * (w < 600 ? 10 : 15),
          vy: (Math.random() - 0.5) * (w < 600 ? 10 : 15),
          size: Math.random() * 20 + 10,
          opacity: 1, // Comienzan visibles
          color: `hsl(${Math.random() * 30 + 340}, 100%, 65%)` // Variaciones de rojo
        });
      }
    }

    // --- INICIALIZACIÓN DE OBJETOS DE FONDO ---
    for (let i = 0; i < 250; i++) stars.push(createStar());
    for (let i = 0; i < 20; i++) hearts.push(createHeart());

    // --- BUCLE PRINCIPAL DE ANIMACIÓN (60 FPS) ---
    function animate() {
      // Fondo negro con rastro (trail effect) para suavidad
      ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
      ctx.fillRect(0, 0, w, h);

      // Calcular el pulso del corazón central
      heartBeat += 0.04;
      const pulseScale = 1 + Math.sin(heartBeat) * 0.1; // Escala oscilante
      const pulseGlow = 25 + Math.sin(heartBeat) * 10;   // Brillo oscilante

      // --- 1. DIBUJAR ESTRELLAS ---
      stars.forEach(s => {
        s.z -= s.speed;
        if (s.z <= 0) s.z = 2000; // Reaparecer al fondo
        const scale = 400 / s.z * zoom;
        // Aplicar paralaje y controles táctiles
        const x = (s.x - w/2 + offsetX) * scale + w/2;
        const y = (s.y - h/2 + offsetY) * scale + h/2;
        
        // Dibujar solo si está dentro de la pantalla
        if (x > 0 && x < w && y > 0 && y < h) {
            ctx.fillStyle = `rgba(255, 255, 255, ${1 - s.z/2000})`; // Más brillantes si están cerca
            ctx.fillRect(x, y, scale * 1.1, scale * 1.1);
        }
      });

      // --- 2. DIBUJAR CORAZÓN CENTRAL Y TEXTO DEL CREADOR ---
      ctx.save();
      // Centrar y aplicar el pulso
      ctx.translate(w/2, h/2);
      ctx.scale(pulseScale, pulseScale);
      
      // A) El Corazón Grande
      ctx.font = `${w < 600 ? 130 : 190}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowBlur = pulseGlow;
      ctx.shadowColor = "red";
      ctx.fillStyle = "rgba(255, 0, 0, 0.28)"; // Rojo semi-transparente elegante
      ctx.fillText("❤", 0, 0);

      // B) El Texto "Creador: VicPersi"
      ctx.shadowBlur = 4; // Brillo nítido para legibilidad
      ctx.shadowColor = "white";
      ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
      // Fuente más fina y elegante
      ctx.font = `300 ${w < 600 ? 14 : 17}px 'Segoe UI', sans-serif`;
      ctx.letterSpacing = "1px";
      // Posicionado ligeramente hacia abajo dentro del corazón
      ctx.fillText("Creador: VicPersi", 0, w < 600 ? 18 : 22); 
      
      ctx.restore();

      // --- 3. DIBUJAR TEXTOS PRINCIPALES (PHRASES) ---
      texts.forEach((t, i) => {
        t.z -= t.speed;
        if (t.z <= 0) { texts.splice(i,1); return; } // Eliminar si pasan la camera
        
        const scale = 300 / t.z * zoom;
        const x = (t.x + offsetX) * scale + w/2;
        const y = (t.y + offsetY) * scale + h/2;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        // Fuente bold para los textos principales
        ctx.font = `bold ${t.baseFont}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowBlur = 18;
        ctx.shadowColor = `hsl(${t.hue}, 85%, 55%)`; // Brillo de color
        ctx.fillStyle = "white";
        // Añadir transparencia basada en la distancia (z)
        ctx.globalAlpha = Math.min(1, t.z / 500); 
        ctx.fillText(t.text, 0, 0);
        ctx.restore();
      });

      // --- 4. DIBUJAR CORAZONES VOLADORES DE FONDO ---
      hearts.forEach(c => {
        c.z -= c.speed;
        if (c.z <= 0) c.z = 2000;
        const scale = 300 / c.z * zoom;
        const x = (c.x - w/2 + offsetX) * scale + w/2;
        const y = (c.y - h/2 + offsetY) * scale + h/2;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale * 1.8, scale * 1.8);
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowBlur = 10;
        ctx.shadowColor = c.color;
        ctx.fillStyle = c.color;
        ctx.globalAlpha = 1 - c.z/2000; // Desvanecer al fondo
        ctx.fillText("❤", 0, 0);
        ctx.restore();
      });

      // --- 5. DIBUJAR EXPLOSIÓN DE CORAZONES INTERACTIVA (NUEVO) ---
      particles.forEach((p, i) => {
        // Mover partículas
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1; // Gravedad suave
        p.opacity -= 0.015; // Desvanecimiento rápido
        p.size *= 0.98; // Encogimiento suave

        // Eliminar si son invisibles
        if (p.opacity <= 0) {
          particles.splice(i, 1);
          return;
        }

        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.font = `${p.size}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.fillText("❤", p.x, p.y);
        ctx.restore();
      });

      requestAnimationFrame(animate);
    }

    // Iniciar animación y spawn periódico de textos
    animate();
    setInterval(spawnTextInOrder, 2200);

    // --- CONTROLES INTERACTIVOS (TÁCTIL Y RATÓN) ---
    let startX = 0, startY = 0, lastDist = 0;
    const music = document.getElementById("bg-music");

    // Función unificada para reproducir música e iniciar la experiencia
    const startExperience = (clientX, clientY) => {
      // 1. Intentar reproducir música
      if (music.paused) {
          music.play().catch(error => {
              // Navegador bloqueó repro automática, necesita otro toque.
          });
      }
      // 2. Crear explosión de corazones en el punto del toque
      createExplosion(clientX, clientY);
    };

    // --- Eventos de Ratón (para PC) ---
    window.addEventListener("mousedown", (e) => {
      startExperience(e.clientX, e.clientY);
    });
    
    // --- Eventos Táctiles (para Móvil) ---
    window.addEventListener("touchstart", (e) => {
      // Prevenir scroll por defecto en móvil para que el canvas sea suave
      if (e.cancelable) e.preventDefault();
      
      const t = e.touches[0];
      // Iniciar música y explosión
      startExperience(t.clientX, t.clientY);

      // Guardar posición inicial para el movimiento (Pan)
      if (e.touches.length === 1) {
          startX = t.clientX;
          startY = t.clientY;
      }
    }, { passive: false }); // passive: false es necesario para preventDefault

    window.addEventListener("touchmove", e => {
      if (e.cancelable) e.preventDefault();

      if(e.touches.length === 1) {
        // Control de Movimiento (Pan) con un dedo
        const t = e.touches[0];
        // Factor 0.5 para suavizar el movimiento
        offsetX += (t.clientX - startX) * 0.5;
        offsetY += (t.clientY - startY) * 0.5;
        startX = t.clientX;
        startY = t.clientY;
      } else if(e.touches.length === 2) {
        // Control de Zoom (Pinch) con dos dedos
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(lastDist) {
          zoom *= dist / lastDist;
          // Limitar el zoom (mínimo 0.3x, máximo 4x)
          zoom = Math.min(Math.max(0.3, zoom), 4);
        }
        lastDist = dist;
      }
    }, { passive: false });

    window.addEventListener("touchend", () => {
        lastDist = 0; // Resetear rastreador de zoom al levantar dedos
    });
  </script>
</body>
</html>
